<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HotTrack Checkout</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 flex flex-col items-center">

    <div id="app" class="w-full max-w-md">
        <h1 class="text-xl font-bold text-center mb-6">Finalizar Compra</h1>
        
        <div id="status" class="text-center p-3 text-sm bg-blue-100 text-blue-800 rounded mb-4">
            A validar acesso...
        </div>

        <div id="checkout-form" class="hidden space-y-4">
            <input type="text" id="user-name" placeholder="Nome Completo" class="w-full p-3 border rounded">
            <button id="btn-gerar-pix" class="w-full bg-green-600 text-white p-3 rounded font-bold">Gerar PIX</button>
        </div>

        <div id="pix-area" class="hidden mt-6 p-4 bg-white border rounded text-center">
            <p class="font-bold">PIX gerado com sucesso!</p>
            <div id="pix-code" class="mt-2 p-2 bg-gray-100 break-all font-mono text-xs"></div>
        </div>

        <!-- Área de Logs para Diagnóstico -->
        <div id="log-container" class="mt-8 p-3 bg-black text-green-400 text-[10px] font-mono rounded overflow-auto max-h-60 w-full text-left">
            <p class="text-white font-bold mb-1">Logs de Diagnóstico:</p>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        // URL absoluta da API em produção
        const API_URL = 'https://hot-track.com';
        
        const tg = window.Telegram.WebApp;
        tg.ready();

        let sessionClickId = null;

        function log(msg) {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.textContent = `> ${msg}`;
            logs.appendChild(entry);
            console.log(`[MiniApp Log] ${msg}`);
        }

        async function initApp() {
            const statusEl = document.getElementById('status');
            
            if (!tg.initData) {
                log("ERRO: initData indisponível. O Mini App deve ser aberto via Telegram.");
                statusEl.innerText = "Erro: Inicie pelo Bot.";
                return;
            }

            log("A tentar autenticar em: " + API_URL + "/api/miniapp/resolve-click");
            
            try {
                const response = await fetch(`${API_URL}/api/miniapp/resolve-click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        initData: tg.initData, 
                        sellerId: '1' 
                    })
                });

                const data = await response.json();
                log(`Resposta recebida (Status ${response.status}): ${JSON.stringify(data)}`);

                if (response.ok && data.valid) {
                    sessionClickId = data.click_id;
                    statusEl.innerText = "Autenticado com sucesso.";
                    document.getElementById('checkout-form').classList.remove('hidden');
                } else {
                    statusEl.innerText = "Erro: Acesso não validado pelo servidor.";
                    log("A validação falhou. Verifique as credenciais e o sellerId.");
                }
            } catch (err) {
                statusEl.innerText = "Erro de rede/conexão.";
                log(`ERRO DE CONEXÃO: ${err.message}. Certifique-se de que o backend permite o domínio do Telegram.`);
            }
        }

        document.getElementById('btn-gerar-pix').onclick = async () => {
            const name = document.getElementById('user-name').value;
            if (!name) return alert("Por favor, preencha o seu nome.");

            try {
                const response = await fetch(`${API_URL}/api/oferta/generate-pix`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        checkoutId: 'cko_seu_id', 
                        value_cents: 1000,
                        click_id: sessionClickId,
                        customer: { name: name }
                    })
                });

                const result = await response.json();
                if (response.ok && result.pix_qrcode) {
                    document.getElementById('pix-code').innerText = result.pix_qrcode;
                    document.getElementById('pix-area').classList.remove('hidden');
                } else {
                    log(`Erro ao gerar PIX: ${result.message || 'Falha na resposta do servidor'}`);
                }
            } catch (err) {
                log(`ERRO NO PIX: ${err.message}`);
            }
        };

        window.onload = initApp;
    </script>
</body>
</html>
