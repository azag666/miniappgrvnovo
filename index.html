<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debug de Click ID</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #8b949e;
            font-weight: 500;
        }

        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 20px;
            background-color: #21262d;
            border: 1px solid #30363d;
        }
        .status.loading { color: #d2a8ff; border-color: #d2a8ff; }
        .status.success { color: #3fb950; border-color: #3fb950; background-color: rgba(63, 185, 80, 0.1); }
        .status.error { color: #ff7b72; border-color: #ff7b72; background-color: rgba(255, 123, 114, 0.1); }

        .click-id-display {
            background-color: #010409;
            border: 1px dashed #30363d;
            padding: 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.5rem;
            color: #58a6ff;
            word-break: break-all;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .debug-info {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #484f58;
            text-align: left;
            background: #010409;
            padding: 10px;
            border-radius: 6px;
            word-break: break-all;
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="status-badge" class="status loading">⏳ Conectando à API...</div>
        
        <h2>Seu Click ID Resolvido:</h2>
        
        <div id="click-id-box" class="click-id-display">
            Aguardando...
        </div>

        <div id="debug-log" class="debug-info"></div>
    </div>

    <script>
        // Configurações do endpoint
        const API_URL = 'https://hot-track.com/api/miniapp/resolve-click-external';
        const TOKEN = 'b8d5ca45-58d0-47be-87b2-367038994c6b';
        const BOT_USERNAME = 'vitoriagrvbot';

        const statusBadge = document.getElementById('status-badge');
        const clickIdBox = document.getElementById('click-id-box');
        const debugLog = document.getElementById('debug-log');

        function logDebug(message) {
            debugLog.style.display = 'block';
            debugLog.innerHTML += `<div>> ${message}</div>`;
        }

        async function resolveClick() {
            // Inicializa Telegram
            if (!window.Telegram || !window.Telegram.WebApp || !window.Telegram.WebApp.initData) {
                statusBadge.className = 'status error';
                statusBadge.textContent = '❌ Fora do Telegram';
                clickIdBox.textContent = 'N/A';
                clickIdBox.style.color = '#ff7b72';
                logDebug('initData não encontrado. Abra pelo bot.');
                return;
            }

            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            const initData = tg.initData;
            logDebug('initData capturado com sucesso.');

            try {
                // Envia para a sua API
                logDebug(`Enviando POST para ${API_URL}`);
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: JSON.stringify({
                        initData: initData,
                        botUsername: BOT_USERNAME
                    })
                });

                const data = await response.json();
                logDebug(`Resposta HTTP: ${response.status}`);
                logDebug(`Body: ${JSON.stringify(data)}`);

                if (response.ok && data.valid) {
                    statusBadge.className = 'status success';
                    statusBadge.textContent = '✅ Sucesso!';
                    
                    if (data.click_id) {
                        clickIdBox.textContent = data.click_id;
                        clickIdBox.style.color = '#3fb950'; // Verde
                    } else {
                        clickIdBox.textContent = 'NULL (Sem clique prévio)';
                        clickIdBox.style.color = '#f0db4f'; // Amarelo
                    }
                } else {
                    statusBadge.className = 'status error';
                    statusBadge.textContent = '⚠️ Erro de Validação';
                    clickIdBox.textContent = 'FALHOU';
                    clickIdBox.style.color = '#ff7b72';
                    logDebug(`Erro da API: ${data.error || 'Desconhecido'}`);
                }

            } catch (error) {
                statusBadge.className = 'status error';
                statusBadge.textContent = '🚨 Erro de Rede';
                clickIdBox.textContent = 'FALHOU';
                clickIdBox.style.color = '#ff7b72';
                logDebug(`Exceção: ${error.message}`);
            }
        }

        // Executa assim que a página carrega
        document.addEventListener('DOMContentLoaded', resolveClick);
    </script>
</body>
</html>
