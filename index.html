<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> Checkout</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 flex flex-col items-center">

    <div id="app" class="w-full max-w-md">
        <h1 class="text-xl font-bold text-center mb-6">Finalizar Compra</h1>
        
        <div id="status" class="text-center p-3 text-sm bg-blue-100 text-blue-800 rounded mb-4">
            Validando acesso...
        </div>

        <div id="checkout-form" class="hidden space-y-4">
            <input type="text" id="user-name" placeholder="Nome Completo" class="w-full p-3 border rounded">
            <button id="btn-gerar-pix" class="w-full bg-green-600 text-white p-3 rounded font-bold">Gerar PIX</button>
        </div>

        <div id="pix-area" class="hidden mt-6 p-4 bg-white border rounded text-center">
            <p class="font-bold">PIX gerado com sucesso!</p>
            <div id="pix-code" class="mt-2 p-2 bg-gray-100 break-all font-mono text-xs"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        let sessionClickId = null;

        async function initApp() {
            const statusEl = document.getElementById('status');
            
            try {
                const response = await fetch('/api/miniapp/resolve-click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData, sellerId: '1' })
                });

                const data = await response.json();

                if (data.valid) {
                    sessionClickId = data.click_id;
                    statusEl.innerText = "Pronto para gerar seu PIX.";
                    document.getElementById('checkout-form').classList.remove('hidden');
                } else {
                    statusEl.innerText = "Erro de autenticação.";
                }
            } catch (err) {
                statusEl.innerText = "Erro ao conectar.";
            }
        }

        document.getElementById('btn-gerar-pix').onclick = async () => {
            const name = document.getElementById('user-name').value;
            if (!name) return alert("Preencha o nome");

            const response = await fetch('/api/oferta/generate-pix', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    checkoutId: 'cko_seu_id', // Ajuste conforme seu backend
                    value_cents: 1000,
                    click_id: sessionClickId,
                    customer: { name: name }
                })
            });

            const result = await response.json();
            if (result.pix_qrcode) {
                document.getElementById('pix-code').innerText = result.pix_qrcode;
                document.getElementById('pix-area').classList.remove('hidden');
            }
        };

        window.onload = initApp;
    </script>
</body>
</html>
