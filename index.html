<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotTrack Debug</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="logs" class="bg-black text-green-400 p-4 font-mono text-xs overflow-auto h-96"></div>

    <script>
        const API_URL = 'https://hot-track.com';
        const API_KEY = 'b8d5ca45-58d0-47be-87b2-367038994c6b';
        const tg = window.Telegram.WebApp;

        function log(msg) {
            document.getElementById('logs').innerHTML += `<div>> ${msg}</div>`;
            console.log(msg);
        }

        async function testarVariacao(tipo) {
            log(`--- Testando Variação ${tipo} ---`);
            let payload = { initData: tg.initData, sellerId: '1' };
            let headers = { 'Content-Type': 'application/json', 'x-api-key': API_KEY };

            try {
                let response;
                if (tipo === 1) { // Original
                    response = await fetch(`${API_URL}/api/miniapp/resolve-click`, { method: 'POST', headers, body: JSON.stringify(payload) });
                } else if (tipo === 2) { // Query String em vez de JSON
                    response = await fetch(`${API_URL}/api/miniapp/resolve-click?sellerId=1&initData=${encodeURIComponent(tg.initData)}`, { method: 'POST', headers });
                } else { // Sem sellerId
                    response = await fetch(`${API_URL}/api/miniapp/resolve-click`, { method: 'POST', headers, body: JSON.stringify({ initData: tg.initData }) });
                }

                const text = await response.text();
                log(`Status: ${response.status}`);
                log(`Corpo: ${text}`);
            } catch (e) {
                log(`Erro na variação ${tipo}: ${e.message}`);
            }
        }

        window.onload = async () => {
            if (!tg.initData) return log("ERRO: Sem initData");
            await testarVariacao(1);
            await testarVariacao(2);
            await testarVariacao(3);
        };
    </script>
</body>
</html>
