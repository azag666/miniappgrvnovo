<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TMA Deep Debugger</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: monospace;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            font-size: 14px;
        }
        
        .header {
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #58a6ff;
        }

        #virtual-console {
            background-color: #010409;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px;
            height: calc(100vh - 80px);
            overflow-y: auto;
            word-wrap: break-word;
        }

        .log-entry { margin-bottom: 8px; border-bottom: 1px dashed #21262d; padding-bottom: 4px; }
        .log-info { color: #8b949e; }
        .log-success { color: #3fb950; }
        .log-error { color: #ff7b72; font-weight: bold; }
        .log-warn { color: #d2a8ff; }
    </style>
</head>
<body>

    <div class="header">Terminal de Debug (HotTrack API)</div>
    
    <div id="virtual-console"></div>

    <script>
        // 1. Configuração do Console Virtual
        const consoleEl = document.getElementById('virtual-console');
        
        function printLog(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-entry log-${type}`;
            
            // Formata objetos para string legível
            const text = typeof msg === 'object' ? JSON.stringify(msg, null, 2) : msg;
            
            const timestamp = new Date().toLocaleTimeString();
            div.textContent = `[${timestamp}] ${text}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight; // Auto-scroll
        }

        // Sequestra os logs padrões
        const origLog = console.log;
        const origError = console.error;
        console.log = (...args) => { printLog(args.join(' '), 'info'); origLog(...args); };
        console.error = (...args) => { printLog(args.join(' '), 'error'); origError(...args); };

        // 2. Configurações da API
        const API_URL = 'https://hot-track.com/api/miniapp/resolve-click-external';
        const TOKEN = 'b8d5ca45-58d0-47be-87b2-367038994c6b';
        const BOT_USERNAME = 'vitoriagrvbot';

        async function runTests() {
            try {
                console.log("Iniciando bateria de testes...");

                // Testa SDK do Telegram
                if (!window.Telegram || !window.Telegram.WebApp) {
                    console.error("FALHA CRÍTICA: window.Telegram não detectado.");
                    return;
                }
                
                const tg = window.Telegram.WebApp;
                tg.ready();
                
                if (!tg.initData) {
                    console.error("FALHA: tg.initData está vazio. O app foi aberto via Menu Button ou Attachment Menu corretamente?");
                    return;
                }
                
                console.log("initData capturado:", tg.initData.substring(0, 30) + "...");

                // Configura a requisição
                const requestOptions = {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: JSON.stringify({
                        initData: tg.initData,
                        botUsername: BOT_USERNAME
                    })
                };

                console.log(`Disparando POST para: ${API_URL}`);
                
                // Dispara a requisição
                const response = await fetch(API_URL, requestOptions);
                
                printLog(`Status HTTP Retornado: ${response.status}`, response.ok ? 'success' : 'warn');

                // Lemos como texto bruto primeiro (para capturar erros 502/HTML do servidor)
                const rawText = await response.text();
                console.log("Corpo da resposta (RAW):", rawText);

                // Tenta fazer o parse para JSON
                try {
                    const jsonData = JSON.parse(rawText);
                    if (response.ok) {
                        printLog(`SUCESSO - Dados da API: ${JSON.stringify(jsonData)}`, 'success');
                    } else {
                        console.error("Erro reportado pela API:", jsonData);
                    }
                } catch (jsonErr) {
                    console.error("Falha ao ler JSON. O servidor devolveu HTML ou vazio?", jsonErr.message);
                }

            } catch (networkError) {
                console.error("FALHA DE REDE OU CORS:", networkError.message);
                printLog("Verifique se o backend tem permissão de CORS para lidar com requisições do Mini App.", 'warn');
            }
        }

        // Dispara o teste após carregar a página
        document.addEventListener('DOMContentLoaded', runTests);
    </script>
</body>
</html>
