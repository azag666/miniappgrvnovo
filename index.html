<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📸 Perfil Vitória ✨ | Checkout Privado</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        // --- CONFIGURAÇÕES ---
        const HOTTRACK_API_URL = 'https://hot-track.com';
        const HOTTRACK_TOKEN = 'b8d5ca45-58d0-47be-87b2-367038994c6b';
        const PRESSEL_ID = 130;
        
        let globalClickId = null;
        let currentPrice = 19.99; 
        let currentTransactionId = null; 
        
        // --- LÓGICA DE GERAÇÃO DE CLICK_ID (IDÊNTICA À PRESSEL) ---
        function getQueryParam(param) {
            return new URLSearchParams(window.location.search).get(param);
        }

        function getCookie(name) {
            const cookies = document.cookie.split('; ');
            for (const cookie of cookies) {
                const [n, v] = cookie.split('=');
                if (n === name) return decodeURIComponent(v);
            }
            return null;
        }

        async function registerClick() {
            try {
                const clickPayload = {
                    presselId: PRESSEL_ID,
                    referer: document.referrer || null,
                    fbclid: getQueryParam('fbclid'),
                    fbp: getCookie('_fbp'),
                    fbc: getCookie('_fbc'),
                    user_agent: navigator.userAgent,
                    click_id: getQueryParam('clickid') || getQueryParam('callback') || getQueryParam('click_id')
                };

                const response = await fetch(`${HOTTRACK_API_URL}/api/registerClick`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(clickPayload)
                });
                
                const data = await response.json();
                globalClickId = data.click_id;
                console.log("Click ID gerado:", globalClickId);
            } catch (e) {
                console.error("Erro ao registrar clique:", e);
            }
        }

        // --- INTEGRAÇÃO HOT-TRACK (SEM HEADER DE AUTORIZAÇÃO PARA EVITAR CORS) ---
        async function processCheckout() {
            const btnSpan = document.getElementById('cta-text');
            const originalText = btnSpan.innerHTML;
            
            try {
                btnSpan.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Gerando PIX...';
                
                const response = await fetch(`${HOTTRACK_API_URL}/api/pix/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: HOTTRACK_TOKEN, // TOKEN NO BODY (EVITA CORS)
                        click_id: globalClickId || "manual_checkout",
                        value_cents: Math.round(currentPrice * 100)
                    })
                });

                const data = await response.json();
                if (response.ok && data.qr_code_text) {
                    currentTransactionId = data.transaction_id;
                    document.getElementById('pix-code').value = data.qr_code_text;
                    document.getElementById('pix-qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(data.qr_code_text)}`;
                    openPixModal();
                } else {
                    alert("Erro ao gerar PIX: " + (data.message || "Tente novamente"));
                }
            } catch (error) {
                alert("Erro de conexão com o servidor.");
            } finally {
                btnSpan.innerHTML = originalText;
            }
        }

        async function verifyPaymentRedirect() {
            const btn = document.querySelector('button[onclick="verifyPaymentRedirect()"]');
            btn.innerHTML = 'Verificando...';
            
            try {
                // TOKEN NA URL (EVITA CORS)
                const response = await fetch(`${HOTTRACK_API_URL}/api/pix/status/${currentTransactionId}?token=${HOTTRACK_TOKEN}`);
                const data = await response.json();

                if (data.status === 'paid') {
                    window.location.href = "https://aprovadopagamentotele.netlify.app";
                } else {
                    alert("Pagamento não identificado. Tente novamente.");
                }
            } catch (e) {
                alert("Erro ao verificar.");
            } finally {
                btn.innerHTML = 'Já paguei! Liberar acesso';
            }
        }

        // --- MODAIS E UI ---
        function openPixModal() {
            document.getElementById('pix-modal').classList.remove('hidden');
            document.getElementById('pix-modal-overlay').classList.remove('hidden');
        }

        function closePixModal() {
            document.getElementById('pix-modal').classList.add('hidden');
            document.getElementById('pix-modal-overlay').classList.add('hidden');
        }

        function copyPixCode() {
            const el = document.getElementById('pix-code');
            el.select();
            document.execCommand('copy');
            alert("Código copiado!");
        }

        // INICIALIZAÇÃO
        document.addEventListener('DOMContentLoaded', registerClick);
    </script>
</head>
<body class="bg-gray-100">
    <div class="flex items-center justify-center h-screen">
        <button onclick="processCheckout()" class="bg-blue-500 text-white p-4 rounded-xl">
            <span id="cta-text">DESBLOQUEAR POR R$ 19,99</span>
        </button>
    </div>

    <div id="pix-modal-overlay" class="fixed inset-0 bg-black/50 hidden"></div>
    <div id="pix-modal" class="fixed bottom-0 w-full bg-white p-6 rounded-t-3xl hidden">
        <img id="pix-qr-img" class="mx-auto mb-4" src="">
        <input type="text" id="pix-code" class="w-full p-2 border mb-4" readonly>
        <button onclick="copyPixCode()" class="w-full bg-blue-500 text-white p-2 mb-2">Copiar</button>
        <button onclick="verifyPaymentRedirect()" class="w-full bg-green-500 text-white p-2">Já paguei! Liberar acesso</button>
    </div>
</body>
</html>
