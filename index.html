<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotTrack Diagnóstico Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="logs" class="bg-black text-green-400 p-4 font-mono text-xs overflow-auto h-96 w-full rounded"></div>

    <script>
        const API_URL = 'https://hot-track.com';
        const API_KEY = 'b8d5ca45-58d0-47be-87b2-367038994c6b';
        const tg = window.Telegram.WebApp;

        function log(msg) {
            document.getElementById('logs').innerHTML += `<div>> ${msg}</div>`;
            console.log(msg);
        }

        async function testarAuth() {
            log("Iniciando verificação de Click ID...");
            
            // O initData do Telegram já contém o 'user' (que inclui id e nome)
            // A identificação do bot é geralmente implícita na validação HMAC do servidor.
            const payload = { 
                initData: tg.initData, 
                sellerId: '105' 
            };

            try {
                const response = await fetch(`${API_URL}/api/miniapp/resolve-click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                log(`Resultado: ${JSON.stringify(data)}`);

                if (data.valid) {
                    if (data.click_id) {
                        log("SUCESSO: Click ID encontrado: " + data.click_id);
                    } else {
                        log("ALERTA: Autenticado, mas Click ID é NULL.");
                        log("Causa: O registro de chat (User ID + Nome) não possui um Click ID associado no banco para o seller 105.");
                    }
                } else {
                    log("FALHA: " + (data.reason || "Erro de validação HMAC"));
                }
            } catch (e) {
                log(`ERRO: ${e.message}`);
            }
        }

        window.onload = () => { tg.ready(); testarAuth(); };
    </script>
</body>
</html>
