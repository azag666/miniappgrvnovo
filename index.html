<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HotTrack Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="app" class="w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-4">Bem-vindo ao HotTrack</h1>
        <div id="status" class="p-4 rounded-lg bg-gray-100 dark:bg-gray-800">
            A carregar dados...
        </div>
        <div id="result" class="mt-6 hidden">
            <p class="text-sm">Click ID recuperado:</p>
            <code id="click-id-display" class="block mt-2 p-2 bg-green-100 text-green-800 font-mono rounded"></code>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        async function initApp() {
            const statusEl = document.getElementById('status');
            const resultEl = document.getElementById('result');
            const clickIdEl = document.getElementById('click-id-display');

            // 1. Enviar initData para o seu backend
            try {
                const response = await fetch('/api/miniapp/resolve-click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        initData: tg.initData,
                        sellerId: '1' // Ajuste conforme a lógica de identificação do vendedor
                    })
                });

                const data = await response.json();

                if (data.valid && data.click_id) {
                    statusEl.innerText = "Autenticado com sucesso!";
                    clickIdEl.innerText = data.click_id;
                    resultEl.classList.remove('hidden');
                } else {
                    statusEl.innerText = "Não foi possível identificar o seu clique. (Orgânico)";
                }
            } catch (err) {
                statusEl.innerText = "Erro ao conectar ao servidor.";
                console.error(err);
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
