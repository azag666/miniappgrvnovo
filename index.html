<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📸 Perfil Vitória ✨ | Checkout Privado</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- ... (seu conteúdo principal permanece igual) ... -->
    <div class="px-4 pb-10">
        <button onclick="processCheckout()" id="btn-checkout" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">DESBLOQUEAR</button>
        xq
        <!-- ÁREA DE LOG PARA DEPURAÇÃO -->
        <div id="debug-log" class="mt-6 p-4 bg-black text-green-400 text-xs rounded-lg overflow-x-auto hidden">
            <h4 class="font-bold border-b border-gray-700 mb-2">Log de Depuração:</h4>
            <pre id="log-content" class="whitespace-pre-wrap"></pre>
        </div>
    </div>

    <script>
        const HOTTRACK_API_KEY = 'b8d5ca45-58d0-47be-87b2-367038994c6b';
        const HOTTRACK_BASE_URL = 'https://hot-track.com/api';
        const CHECKOUT_ID = 'cko_8e17de04-8902-45d3-ad0c-fda7de5cd84d'; 
        
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        const INIT_DATA = tg ? (tg.initData || '') : '';
        
        function showLog(message) {
            const logDiv = document.getElementById('debug-log');
            const logContent = document.getElementById('log-content');
            logDiv.classList.remove('hidden');
            logContent.innerText += `\n> ${message}`;
        }

        async function processCheckout() {
            try {
                showLog("Iniciando Checkout...");
                showLog(`InitData: ${INIT_DATA.substring(0, 20)}...`);

                // 1. RESOLVE CLICK
                showLog("Chamando /miniapp/resolve-click");
                const resolveClickRes = await fetch(`${HOTTRACK_BASE_URL}/miniapp/resolve-click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: INIT_DATA, checkoutId: CHECKOUT_ID })
                });

                const clickData = await resolveClickRes.json();
                showLog(`Resposta Resolve: ${JSON.stringify(clickData)}`);
                
                if (!clickData.click_id) throw new Error("Sem click_id");

                // 2. GERA PIX
                showLog("Chamando /pix/generate");
                const generateRes = await fetch(`${HOTTRACK_BASE_URL}/pix/generate`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': HOTTRACK_API_KEY
                    },
                    body: JSON.stringify({ click_id: clickData.click_id, value_cents: 1999 })
                });

                const pixData = await generateRes.json();
                showLog(`Resposta PIX: ${JSON.stringify(pixData)}`);

                if (!generateRes.ok) throw new Error("Erro na API PIX");

                showLog("PIX Gerado com sucesso!");
            } catch (error) {
                showLog(`ERRO: ${error.message}`);
            }
        }
    </script>
</body>
</html>
