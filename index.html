<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📸 Perfil Vitória ✨ | Checkout Privado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .btn-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 175, 240, 0.4); } 70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(0, 175, 240, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 175, 240, 0); } }
        .video-locked { filter: blur(14px) brightness(0.6); }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

    <!-- Estrutura Principal -->
    <div id="checkout-view" class="w-full flex flex-col justify-center items-center min-h-screen">
        <div class="w-full max-w-md bg-white min-h-screen shadow-2xl flex flex-col overflow-hidden text-left">
            <header class="sticky top-0 z-30 bg-white/90 backdrop-blur-md border-b p-4 text-center">
                <h1 class="font-bold text-lg text-blue-500 uppercase">Checkout Seguro</h1>
            </header>
            
            <main class="flex-1 pb-32">
                <div class="px-4 py-8 text-center">
                    <button onclick="processCheckout()" class="w-full bg-blue-500 text-white rounded-2xl py-4 font-black text-lg btn-pulse">
                        <span id="cta-text">DESBLOQUEAR POR R$ 19,99</span>
                    </button>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal PIX -->
    <div id="pix-modal" class="fixed bottom-0 left-0 w-full bg-white rounded-t-3xl z-50 hidden p-6 text-center">
        <input type="text" id="pix-code" readonly class="w-full p-3 bg-gray-100 mb-4 rounded-xl">
        <button onclick="verifyPaymentRedirect()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold">JÁ PAGUEI</button>
    </div>

    <script>
        const HOTTRACK_API_URL = 'https://hot-track.com';
        const HOTTRACK_TOKEN = 'b8d5ca45-58d0-47be-87b2-367038994c6b';
        const SELLER_ID = 'SEU_ID_DO_VENDEDOR'; // Configure o ID do vendedor aqui

        let globalClickId = null;

        /**
         * FUNÇÃO ATUALIZADA: Consulta o Click ID via endpoint interno.
         * Como é uma chamada interna (mesmo domínio), não há ativação de CORS[cite: 3].
         */
        async function resolveClickIdFromTelegram() {
            if (window.Telegram?.WebApp?.initData) {
                try {
                    console.log("🔍 Consultando Click ID via API Interna...");
                    const response = await fetch('/api/miniapp/resolve-click', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sellerId: SELLER_ID,
                            initData: window.Telegram.WebApp.initData
                        })
                    });
                    
                    const data = await response.json();
                    if (data.valid && data.click_id) {
                        console.log("✅ Click ID Primário recuperado:", data.click_id);
                        return data.click_id;
                    }
                } catch (e) {
                    console.error("❌ Erro na API Interna:", e);
                }
            }
            return null;
        }

        async function processCheckout() {
            const btnSpan = document.getElementById('cta-text');
            btnSpan.innerText = 'Gerando...';
            
            // Tenta recuperar o click original antes de processar o PIX[cite: 3]
            if (!globalClickId) {
                globalClickId = await resolveClickIdFromTelegram();
            }

            const finalClickId = globalClickId ? `/start ${globalClickId.replace('/start ', '')}` : '/start lead_novo';

            try {
                const response = await fetch(`${HOTTRACK_API_URL}/api/pix/generate`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'x-api-key': HOTTRACK_TOKEN 
                    },
                    body: JSON.stringify({ 
                        click_id: finalClickId,
                        value_cents: 1999
                    })
                });

                const data = await response.json();
                if (data.qr_code_text) {
                    document.getElementById('pix-code').value = data.qr_code_text;
                    document.getElementById('pix-modal').classList.remove('hidden');
                }
            } catch (e) {
                alert("Erro ao gerar PIX");
            } finally {
                btnSpan.innerText = 'DESBLOQUEAR POR R$ 19,99';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.Telegram?.WebApp) {
                Telegram.WebApp.ready();
            }
        });
    </script>
</body>
</html>
