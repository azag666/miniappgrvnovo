<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HotTrack Debug</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="logs" class="bg-black text-green-400 p-4 font-mono text-xs overflow-auto h-96 w-full rounded"></div>

    <script>
        const API_URL = 'https://hot-track.com';
        const API_KEY = 'b8d5ca45-58d0-47be-87b2-367038994c6b';
        const tg = window.Telegram.WebApp;

        function log(msg) {
            const logs = document.getElementById('logs');
            logs.innerHTML += `<div>> ${msg}</div>`;
            console.log(msg);
        }

        async function testarAuth() {
            log(`Iniciando teste com sellerId: 105...`);
            
            if (!tg.initData) {
                log("ERRO: initData está vazio.");
                return;
            }

            const payload = { 
                initData: tg.initData, 
                sellerId: '105' 
            };

            try {
                const response = await fetch(`${API_URL}/api/miniapp/resolve-click`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY 
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                log(`Status HTTP: ${response.status}`);
                log(`Resposta JSON: ${JSON.stringify(data)}`);

                if (data.valid) {
                    log("SUCESSO: Autenticação validada com o ID 105!");
                } else {
                    log(`FALHA: O servidor retornou valid: false.`);
                    log(`Verifique se o bot utilizado no Telegram pertence realmente ao sellerId 105.`);
                }
            } catch (e) {
                log(`ERRO DE EXECUÇÃO: ${e.message}`);
            }
        }

        window.onload = async () => {
            tg.ready();
            await testarAuth();
        };
    </script>
</body>
</html>
