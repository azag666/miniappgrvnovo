<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📸 Perfil Vitória ✨ | Checkout Privado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        const HOTTRACK_API_URL = 'https://hot-track.com';
        const HOTTRACK_TOKEN = 'b8d5ca45-58d0-47be-87b2-367038994c6b';
        const PRESSEL_ID = 130;
        
        let globalClickId = null;
        let isRegistering = false;

        // 1. Função de Rastreio (Igual a sua Pressel)
        async function registerClick() {
            if (isRegistering) return;
            isRegistering = true;
            
            const params = new URLSearchParams(window.location.search);
            const clickPayload = {
                presselId: PRESSEL_ID,
                fbclid: params.get('fbclid'),
                click_id: params.get('clickid') || params.get('callback') || params.get('click_id') || params.get('start')
            };

            try {
                const res = await fetch(`${HOTTRACK_API_URL}/api/registerClick`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(clickPayload)
                });
                const data = await res.json();
                globalClickId = data.click_id;
                console.log("Click ID Registrado:", globalClickId);
            } catch (e) {
                console.error("Erro no registro:", e);
                globalClickId = params.get('start') || "fallback_id";
            }
            isRegistering = false;
        }

        // 2. Processar Checkout (Usando Headers conforme documentação)
        async function processCheckout() {
            const btn = document.getElementById('cta-text');
            if (!globalClickId) await registerClick(); // Garante o registro

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Gerando PIX...';
            
            try {
                const response = await fetch(`${HOTTRACK_API_URL}/api/pix/generate`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': HOTTRACK_TOKEN 
                    },
                    body: JSON.stringify({ 
                        click_id: globalClickId,
                        value_cents: 1999
                    })
                });

                const data = await response.json();
                if (response.ok && data.qr_code_text) {
                    window.currentTransactionId = data.transaction_id;
                    document.getElementById('pix-code').value = data.qr_code_text;
                    document.getElementById('pix-qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(data.qr_code_text)}`;
                    document.getElementById('pix-modal').classList.remove('hidden');
                } else {
                    alert("Erro API: " + (data.message || "Click ID não encontrado."));
                }
            } catch (e) { alert("Erro de conexão."); }
            btn.innerHTML = "DESBLOQUEAR POR R$ 19,99";
        }

        // 3. Status PIX (Conforme documentação)
        async function checkStatus() {
            const res = await fetch(`${HOTTRACK_API_URL}/api/pix/status/${window.currentTransactionId}`, {
                headers: { 'x-api-key': HOTTRACK_TOKEN }
            });
            const data = await res.json();
            if (data.status === 'paid') window.location.href = "https://aprovadopagamentotele.netlify.app";
            else alert("Pagamento pendente...");
        }

        document.addEventListener('DOMContentLoaded', registerClick);
    </script>
</head>
<body class="bg-gray-100 p-6 flex flex-col items-center">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-lg text-center">
        <h1 class="text-2xl font-bold mb-4">Vitoria</h1>
        <button onclick="processCheckout()" class="w-full bg-blue-500 text-white py-4 rounded-xl font-bold">
            <span id="cta-text">DESBLOQUEAR POR R$ 19,99</span>
        </button>
    </div>

    <div id="pix-modal" class="hidden fixed inset-0 bg-white p-6 flex flex-col items-center justify-center">
        <img id="pix-qr-img" class="mb-4">
        <input type="text" id="pix-code" class="w-full border p-2 mb-4" readonly>
        <button onclick="checkStatus()" class="w-full bg-green-500 text-white py-3 rounded-lg font-bold">Já paguei! Liberar acesso</button>
    </div>
</body>
</html>
