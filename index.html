<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📸 Perfil Vitória ✨ | Checkout Privado</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <div class="px-4 pb-10 pt-10">
        <button onclick="processCheckout()" id="btn-checkout" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">DESBLOQUEAR</button>
        
        <!-- ÁREA DE LOG COMPLETA PARA DEPURAÇÃO -->
        <div id="debug-log" class="mt-6 p-4 bg-black text-green-400 text-xs rounded-lg overflow-x-auto">
            <div class="flex justify-between items-center border-b border-gray-700 mb-2 pb-2">
                <h4 class="font-bold uppercase tracking-widest">Log de Depuração Completo:</h4>
                <button onclick="copyAllLogs()" class="bg-green-700 hover:bg-green-600 text-white px-2 py-1 rounded text-[10px] font-bold uppercase">Copiar Log</button>
            </div>
            <pre id="log-content" class="whitespace-pre-wrap text-[10px] leading-relaxed"></pre>
        </div>
    </div>

    <script>
        const HOTTRACK_API_KEY = 'b8d5ca45-58d0-47be-87b2-367038994c6b';
        const HOTTRACK_BASE_URL = 'https://hot-track.com/api';
        const CHECKOUT_ID = 'cko_8e17de04-8902-45d3-ad0c-fda7de5cd84d'; 
        
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        const INIT_DATA = tg ? (tg.initData || '') : '';
        
        // Exibir parâmetros ao carregar a página
        window.onload = () => {
            showLog("Mini App Inicializado. Parâmetros Telegram.WebApp:", tg);
        };

        function showLog(message, data = null) {
            const logContent = document.getElementById('log-content');
            const timestamp = new Date().toLocaleTimeString();
            let msg = `[${timestamp}] ${message}`;
            if (data) msg += `\n>> DADOS: ${JSON.stringify(data, null, 2)}`;
            logContent.innerText += `\n\n${msg}\n-------------------`;
        }

        function copyAllLogs() {
            const logs = document.getElementById('log-content').innerText;
            navigator.clipboard.writeText(logs).then(() => {
                alert("Logs copiados para a área de transferência!");
            });
        }

        async function processCheckout() {
            try {
                showLog("Iniciando Checkout...");
                
                // 1. RESOLVE CLICK
                const payloadClick = { initData: INIT_DATA, checkoutId: CHECKOUT_ID };
                showLog("POST /miniapp/resolve-click", payloadClick);

                const resolveClickRes = await fetch(`${HOTTRACK_BASE_URL}/miniapp/resolve-click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payloadClick)
                });

                const clickData = await resolveClickRes.json();
                showLog("RESPOSTA /miniapp/resolve-click", clickData);
                
                if (!clickData.click_id) throw new Error("API resolve-click não retornou click_id");

                // 2. GERA PIX
                const payloadPix = { click_id: clickData.click_id, value_cents: 1999 };
                showLog("POST /pix/generate", payloadPix);

                const generateRes = await fetch(`${HOTTRACK_BASE_URL}/pix/generate`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': HOTTRACK_API_KEY
                    },
                    body: JSON.stringify(payloadPix)
                });

                const pixData = await generateRes.json();
                showLog("RESPOSTA /pix/generate", pixData);

                if (!generateRes.ok) throw new Error("Erro na API PIX: " + JSON.stringify(pixData));

                showLog("SUCESSO: PIX Gerado!");
            } catch (error) {
                showLog(`ERRO CRÍTICO: ${error.message}`);
            }
        }
    </script>
</body>
</html>
